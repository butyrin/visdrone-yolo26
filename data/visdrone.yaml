# Ultralytics YOLO dataset configuration file for VisDrone-DET
# All paths are relative to the repository root directory

path: data/datasets/VisDrone  # dataset root dir (automatically created later)

train: images/train  # train images (relative to path)
val: images/val      # val images (relative to path)

# Number of target classes (excluding ignored regions and 'others')
nc: 10

# Object class names mapped from VisDrone categories
names:
  0: pedestrian
  1: people
  2: bicycle
  3: car
  4: van
  5: truck
  6: tricycle
  7: awning-tricycle
  8: bus
  9: motor
